<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>20代キャリア診断</title>
  <style>
    :root {
      --yellow: #ffd21e;
      --black: #111111;
      --ivory: #fff8e6;
      --white: #ffffff;
      --muted: #595959;
      --line: #ece4cf;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--ivory);
      color: var(--black);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
      letter-spacing: 0;
    }

    button,
    a {
      font: inherit;
    }

    .app {
      width: min(100%, 430px);
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .hero,
    .question-card,
    .result-card {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.9)),
        var(--white);
      box-shadow: 0 24px 70px rgba(17, 17, 17, 0.08);
    }

    .hero {
      padding: 36px 26px 30px;
      text-align: center;
    }

    .mark {
      width: 92px;
      height: 76px;
      display: block;
      margin: 0 auto 20px;
      border-radius: 22px;
      object-fit: contain;
      background: var(--yellow);
      box-shadow: 0 16px 32px rgba(255, 210, 30, 0.36);
    }

    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      margin-bottom: 10px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(27px, 7vw, 35px);
      line-height: 1.16;
      font-weight: 900;
    }

    h1 span {
      display: block;
    }

    h1 .headline-tight {
      font-size: clamp(24px, 6.2vw, 32px);
      white-space: nowrap;
    }

    .lead {
      margin-top: 16px;
      color: var(--muted);
      font-size: clamp(10px, 3.2vw, 14px);
      line-height: 1.85;
      font-weight: 700;
    }

    .lead span {
      display: block;
      white-space: nowrap;
    }

    .primary-button,
    .choice-button {
      width: 100%;
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 900;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
    }

    .primary-button {
      margin-top: 26px;
      padding: 17px 18px;
      background: var(--yellow);
      color: var(--black);
      box-shadow: 0 14px 26px rgba(255, 210, 30, 0.3);
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }

    .primary-button:active,
    .choice-button:active {
      transform: scale(0.98);
    }

    .question-card {
      padding: 28px 20px 22px;
    }

    .progress {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .bar {
      flex: 1;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #f0ead7;
    }

    .bar span {
      display: block;
      width: 20%;
      height: 100%;
      border-radius: inherit;
      background: var(--yellow);
      transition: width 0.2s ease;
    }

    .question {
      font-size: 20px;
      line-height: 1.45;
      font-weight: 900;
    }

    .choices {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .choice-button {
      min-height: 58px;
      padding: 15px 16px;
      border: 1px solid #efe4c8;
      background: var(--white);
      color: var(--black);
      text-align: left;
      line-height: 1.55;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(17, 17, 17, 0.04);
    }

    .choice-button:hover {
      box-shadow: 0 12px 28px rgba(17, 17, 17, 0.08);
    }

    .result-wrap {
      width: min(100%, 520px);
      margin: 0 auto;
    }

    .result-card {
      padding: 28px 22px;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .result-title {
      margin-top: 6px;
      font-size: 24px;
      line-height: 1.35;
      font-weight: 900;
    }

    .description {
      margin-top: 18px;
      line-height: 1.9;
      font-size: 15px;
      font-weight: 700;
      white-space: pre-line;
    }

    .steps {
      display: grid;
      gap: 12px;
      margin: 24px 0 0;
      padding: 0;
      list-style: none;
    }

    .steps li {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 700;
      line-height: 1.7;
    }

    .check {
      color: var(--yellow);
      font-weight: 900;
    }

    .encourage {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 2px solid var(--yellow);
      line-height: 1.9;
      font-size: 15px;
      font-weight: 700;
    }

    .cta {
      margin-top: 22px;
      padding: 22px;
      border-radius: 22px;
      background: var(--black);
      color: var(--white);
      box-shadow: 0 18px 45px rgba(17, 17, 17, 0.18);
    }

    .cta p {
      line-height: 1.85;
      font-size: 14px;
      font-weight: 700;
    }

    .cta .primary-button {
      margin-top: 18px;
    }

    @media (max-width: 520px) {
      body {
        padding: 18px;
      }

      .screen.active:not(#result-screen) {
        min-height: calc(100svh - 36px);
        display: grid;
        place-items: center;
      }

      #result-screen.active {
        padding: 14px 0 28px;
      }

      .hero {
        padding: 32px 22px 28px;
      }

      .question-card {
        padding: 24px 18px 20px;
      }

      .result-card {
        padding: 26px 18px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="start-screen" class="screen active">
      <div class="hero">
        <img class="mark" src="carricoco-symbol.png" alt="キャリココ">
        <p class="eyebrow">キャリココ｜20代キャリア診断</p>
        <h1><span>一度きりの人生</span><span class="headline-tight">今の仕事に熱狂できてる？</span></h1>
        <p class="lead"><span>本当に転職すべきか、今の環境で積むべきか。</span><span>決めきれない感情を、5つの問いで整理しましょう。</span></p>
        <button class="primary-button" type="button" id="start-button">診断スタート</button>
      </div>
    </section>

    <section id="question-screen" class="screen">
      <div class="question-card">
        <div class="progress">
          <span id="count">1/5</span>
          <div class="bar"><span id="bar"></span></div>
        </div>
        <h2 class="question" id="question"></h2>
        <div class="choices" id="choices"></div>
      </div>
    </section>

    <section id="result-screen" class="screen">
      <div class="result-wrap">
        <div class="result-card">
          <p class="label">あなたのキャリア現在地</p>
          <h2 class="result-title" id="result-title"></h2>
          <p class="description" id="result-description"></p>
          <ul class="steps" id="result-steps"></ul>
          <div class="encourage">
            <p>今の状態がゴールではありません。<br>選び方と積む経験を変えれば、キャリアはここから作れます。</p>
          </div>
        </div>
        <div class="cta">
          <p>ひとりで決めきれない時は、LINEで一緒に整理できます。<br>求人紹介ではなく、今の違和感と次に積む経験を見つける相談です。</p>
          <a class="primary-button" id="line-cta" href="https://s.lmes.jp/landing-qr/2010510428-cajnjJXS?uLand=hlHean" target="_blank" rel="noopener">LINEでキャリア相談する</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const questions = [
      {
        text: "今の仕事について、いちばん近い感覚は？",
        choices: [
          ["A", "嫌いではないが、何か引っ掛かってる"],
          ["B", "頑張ってるのに、先が見えてこない"],
          ["C", "周りとの差を感じ始めてる"],
          ["D", "もっと成長できる環境がいい"]
        ]
      },
      {
        text: "キャリアを考える時、いちばん引っかかることは？",
        choices: [
          ["A", "やりたいことがない"],
          ["B", "自分の強みがわからない"],
          ["C", "SNSの情報に振り回される"],
          ["D", "未経験だから不安"]
        ]
      },
      {
        text: "SNSを見た時、近い感情は？",
        choices: [
          ["A", "焦っているかわからない"],
          ["B", "友人が楽しそうにしている姿と比べてしまう"],
          ["C", "副業系の発信を見ると\n今のままでいいのか不安になる"],
          ["D", "自分ももっと成長できる環境に行きたい"]
        ]
      },
      {
        text: "今いちばん知りたいことは？",
        choices: [
          ["A", "今のモヤモヤの正体"],
          ["B", "強みや向いている仕事"],
          ["C", "自分だけのキャリア軸"],
          ["D", "成長できる環境の見つけ方"]
        ]
      },
      {
        text: "次の一歩として近いものは？",
        choices: [
          ["A", "まず誰かに話して整理したい"],
          ["B", "今の経験をどう活かせるか知りたい"],
          ["C", "スクールや転職を決める前に相談したい"],
          ["D", "営業・販売・未経験職種の可能性を見たい"]
        ]
      }
    ];

    const results = {
      A: {
        title: "まずは、違和感を言葉にする時期",
        description: "今のままでいいのか迷っている状態です。転職を決める前に、何に引っ掛かっているのかを整理すると次の一歩が見えやすくなります。",
        steps: ["今の仕事で引っ掛かる瞬間を書き出す", "少しでも前向きになれた経験を思い出す", "転職するか決める前に、違和感を整理する"]
      },
      B: {
        title: "強みを見つける時期",
        description: "頑張ってきたのに、先が見えにくい状態です。これまでの経験を整理すると、向いている仕事や次に積むべき経験が見えてきます。",
        steps: ["これまで任されたことを書き出す", "人から感謝された場面を振り返る", "強みや向いている仕事を整理する"]
      },
      C: {
        title: "情報に振り回されず、軸を作る時期",
        description: "SNSを見るほど不安になりやすい状態です。\n焦って決めるより、自分に必要な経験と選び方を整理することが大切です。",
        steps: ["焦っている理由を書き出す", "今すぐ変えることと積むべき経験を分ける", "自分だけのキャリア軸を整理する"]
      },
      D: {
        title: "成長できる環境を選ぶ時期",
        description: "もっと伸びたい気持ちが出ている状態です。勢いだけで選ばず、どんな環境で何を積むかを決めると、次の一歩が強くなります。",
        steps: ["伸ばしたい力を整理する", "自分に合う成長環境を知る", "求人を見る前に、キャリアの軸を決める"]
      }
    };

    const lineRoutes = {
      default: "https://s.lmes.jp/landing-qr/2010510428-cajnjJXS?uLand=hlHean",
      x: "https://s.lmes.jp/landing-qr/2010510428-cajnjJXS?uLand=hlHean",
      twitter: "https://s.lmes.jp/landing-qr/2010510428-cajnjJXS?uLand=hlHean",
      threads: "https://s.lmes.jp/landing-qr/2010510428-cajnjJXS?uLand=hlHean",
      instagram: "https://s.lmes.jp/landing-qr/2010510428-cajnjJXS?uLand=u5hcjz",
      ig: "https://s.lmes.jp/landing-qr/2010510428-cajnjJXS?uLand=u5hcjz",
      tiktok: "https://s.lmes.jp/landing-qr/2010510428-cajnjJXS?uLand=u5hcjz",
      note: "https://s.lmes.jp/landing-qr/2010510428-cajnjJXS?uLand=wYB3yK",
      article: "https://s.lmes.jp/landing-qr/2010510428-cajnjJXS?uLand=wYB3yK"
    };

    const scores = { A: 0, B: 0, C: 0, D: 0 };
    let current = 0;

    const startScreen = document.getElementById("start-screen");
    const questionScreen = document.getElementById("question-screen");
    const resultScreen = document.getElementById("result-screen");
    const questionEl = document.getElementById("question");
    const choicesEl = document.getElementById("choices");
    const countEl = document.getElementById("count");
    const barEl = document.getElementById("bar");
    const lineCta = document.getElementById("line-cta");

    function applyLineRoute() {
      const params = new URLSearchParams(window.location.search);
      const source = (params.get("src") || params.get("utm_source") || "default").toLowerCase();
      lineCta.href = lineRoutes[source] || lineRoutes.default;
    }

    function show(screen) {
      [startScreen, questionScreen, resultScreen].forEach((el) => el.classList.remove("active"));
      screen.classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderQuestion() {
      const q = questions[current];
      countEl.textContent = `${current + 1}/5`;
      barEl.style.width = `${((current + 1) / questions.length) * 100}%`;
      questionEl.textContent = q.text;
      choicesEl.innerHTML = "";

      q.choices.forEach(([key, text]) => {
        const button = document.createElement("button");
        button.className = "choice-button";
        button.type = "button";
        button.innerHTML = `<span class="choice-key">${key}.</span> ${text.replace(/\n/g, "<br>")}`;
        button.addEventListener("click", () => answer(key));
        choicesEl.appendChild(button);
      });
    }

    function answer(key) {
      scores[key] += 1;
      current += 1;

      if (current < questions.length) {
        renderQuestion();
        return;
      }

      renderResult();
    }

    function getResultKey() {
      const priority = ["C", "A", "B", "D"];
      const max = Math.max(...Object.values(scores));
      return priority.find((key) => scores[key] === max);
    }

    function renderResult() {
      const result = results[getResultKey()];
      document.getElementById("result-title").textContent = result.title;
      document.getElementById("result-description").textContent = result.description;
      const steps = document.getElementById("result-steps");
      steps.innerHTML = "";

      result.steps.forEach((step) => {
        const li = document.createElement("li");
        li.innerHTML = `<span class="check">✓</span><span>${step}</span>`;
        steps.appendChild(li);
      });

      show(resultScreen);
    }

    document.getElementById("start-button").addEventListener("click", () => {
      renderQuestion();
      show(questionScreen);
    });

    applyLineRoute();
  </script>
</body>
</html>
